# LightESB MySQL Route Service - 服务特定配置
# ================================================
service.name=MysqlRouteSrv
service.version=1.0.0
service.description=LightESB MySQL 独立路由服务
service.author=LightESB Team

service.instance.id=mysql-route-srv-001
service.instance.name=MySQL Route Service Instance 1
service.environment=development

# 路由展示名称
lightesb.route.MysqlRouteSrv.v100.serviceCnName=MySQL路由服务

# 外部数据库组件示例配置（一期）
extdb.enabled=true
extdb.default=primary
extdb.ids=primary
extdb.primary.type=mysql
extdb.primary.url=jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
extdb.primary.driver=com.mysql.cj.jdbc.Driver
extdb.primary.username=root         
extdb.primary.password=nghxni
extdb.primary.maxPoolSize=10

# 路由/模块级目标数据源覆盖示例
mysqlroute.target.datasource=primary
