# LightESB 动态路由配置
# 此文件包含 LightESB 的所有配置参数
# 可以根据不同环境（开发、测试、生产）修改相应的参数值
logging.level.com.oureman.soa.lightesb=INFO
# logging.level.com.oureman.soa.lightesb=DEBUG
logging.level.org.apache.camel=INFO

# LightESB Configuration
# 配置管理相关配置
lightesb.config.default-encoding=UTF-8
lightesb.config.config-file-names=common.config.properties,service.config.properties
lightesb.config.cache-enabled=true
lightesb.config.cache-ttl-seconds=300

# 路由配置
lightesb.route.directory=lightesb-camel-app
lightesb.route.encoding=UTF-8
lightesb.route.xmlio-namespace=http://camel.apache.org/schema/xml-io
lightesb.route.route-id-prefix=route_
lightesb.route.context-name-prefix=FileContext-
lightesb.route.bean-filter-suffixes=service,Service

# 文件监控配置
lightesb.route.file-extensions=.xml
lightesb.route.recursive-monitoring=true
lightesb.route.debounce-delay-ms=500
lightesb.route.debounce-cleanup-threshold=100
lightesb.route.debounce-retention-multiplier=5

# 线程池配置
lightesb.route.shutdown-timeout-seconds=10
lightesb.route.force-shutdown-timeout-seconds=5

# 文件稳定性检查配置
lightesb.route.file-stable-wait-ms=100
lightesb.route.file-stable-max-attempts=10

# LightESB Service-Level Logging Configuration
lightesb.logging.default-pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} | %-5.5p | [%X{service.name}-%X{service.version}] | %X{route.id} | %X{exchange.id} | %-30.30c{1} | %m%n
lightesb.logging.default-level=INFO
lightesb.logging.console-enabled=true
lightesb.logging.file-max-size=10MB
lightesb.logging.file-max-backup=5

# 日志文件按日期分割和清理配置
lightesb.logging.date-pattern=yyyy-MM-dd
lightesb.logging.log-retention-days=30
lightesb.logging.auto-cleanup-enabled=true
lightesb.logging.cleanup-schedule-hours=24

# 健康检查配置
lightesb.logging.health-check-enabled=true
lightesb.logging.max-log-file-size-mb=100



# MySQL数据库连接配置
lightesb.mysql.url=jdbc:mysql://192.168.252.166:3307/esbconsole?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
lightesb.mysql.driver=com.mysql.cj.jdbc.Driver
lightesb.mysql.username=root
lightesb.mysql.password=root

