# LightESB 动态路由配置
# 此文件包含 LightESB 的所有配置参数
# 可以根据不同环境（开发、测试、生产）修改相应的参数值

# =============================================================================
# 默认配置（所有环境通用）
# =============================================================================

# Logging Configuration
logging.level.com.oureman.soa.lightesb=INFO
logging.level.org.apache.camel=INFO

# =============================================================================
# AI 日志管理（ChatModel + Agent + Tools）
# 默认关闭，配置模型后再开启
# =============================================================================
# 功能开关与访问控制
# enabled: 是否启用 AI 日志管理能力
# read-only: 只读模式（true 时仅查询/演练，不会实际改级别）
# auth-token: 可选鉴权令牌，留空表示不校验
lightesb.ai.logging.enabled=true
lightesb.ai.logging.read-only=false
lightesb.ai.logging.auth-token=
# base-url: 业务管理接口根地址（/api/logging、/actuator）
# agent-gateway-url: AI 路由网关地址（AiLogControlSrv 对外入口）
lightesb.ai.logging.base-url=http://localhost:8080
lightesb.ai.logging.agent-gateway-url=http://localhost:19093/api/ai/logging/agent
# default-revert-minutes: 默认回滚时间（实际回滚由既有接口机制处理）
lightesb.ai.logging.default-revert-minutes=30
# allowed-logger-prefixes: 应用日志可操作前缀白名单（Actuator 目标）
lightesb.ai.logging.allowed-levels=TRACE,DEBUG,INFO,WARN,ERROR
lightesb.ai.logging.allowed-logger-prefixes=com.oureman.soa.lightesb,org.apache.camel
lightesb.ai.logging.system-message=你是LightESB日志管理助手。你只能执行日志管理相关操作，只能使用可用工具，不要编造结果。修改前先确认目标与级别，输出简洁中文结果。当工具返回requiresClarification=true后，下一轮若用户提供版本号/候选信息，必须继续调用工具，不得闲聊或直接下结论。若候选仍不唯一，必须要求补充唯一serviceKey，不得编造最终日志结论。
lightesb.ai.logging.clarification-fallback-enabled=true
lightesb.ai.logging.clarification.max-turns=5
# 模型提供方与通用参数
# provider: gemini | dashscope
# model.name 留空时使用 provider 下的默认 model-name
# lightesb.ai.logging.model.provider=gemini
lightesb.ai.logging.model.provider=dashscope
lightesb.ai.logging.model.name=
lightesb.ai.logging.model.temperature=0.1
lightesb.ai.logging.model.max-tokens=2048
lightesb.ai.logging.model.timeout-seconds=30
# Gemini 参数（推荐通过环境变量注入 api-key）
lightesb.ai.logging.model.gemini.api-key=${GEMINI_API_KEY:AIzaSyBWjrCgZBxn6Mf--B2HlcXQ2ZgmHxenTDI}
lightesb.ai.logging.model.gemini.base-url=
lightesb.ai.logging.model.gemini.model-name=gemini-2.5-flash
# DashScope 参数（可作为 Gemini 的替代提供方）
lightesb.ai.logging.model.dashscope.api-key=${DASHSCOPE_API_KEY:sk-f243763eeb1f4472b694a6b038f30c4c}
lightesb.ai.logging.model.dashscope.base-url=
lightesb.ai.logging.model.dashscope.model-name=qwen-plus
lightesb.ai.logging.model.dashscope.top-p=0.8
# 429/限流重试（指数退避）
# waitMs = min(max-delay-ms, initial-delay-ms * multiplier^(attempt-1)) + jitter
# max-attempts 包含首次请求；例如 4 表示“首次 + 最多重试3次”
lightesb.ai.logging.retry.enabled=true
lightesb.ai.logging.retry.max-attempts=4
lightesb.ai.logging.retry.initial-delay-ms=1000
lightesb.ai.logging.retry.max-delay-ms=30000
lightesb.ai.logging.retry.multiplier=2.0
lightesb.ai.logging.retry.jitter-ms=250

# LightESB Configuration
# 配置管理相关配置
lightesb.trial.start-date=2026-04-03
lightesb.route.directory=lightesb-camel-app
lightesb.route.temp-only-service=HttpRequestSrv
lightesb.route.encoding=UTF-8
lightesb.route.context-name-prefix=FileContext-
lightesb.route.bean-filter-suffixes=service,Service

# 文件监控配置
lightesb.route.file-extensions=.xml
lightesb.route.recursive-monitoring=true
lightesb.route.debounce-delay-ms=500
lightesb.route.debounce-cleanup-threshold=100
lightesb.route.debounce-retention-multiplier=5

# 线程池配置
lightesb.route.shutdown-timeout-seconds=10
lightesb.route.force-shutdown-timeout-seconds=5

# 文件稳定性检查配置
lightesb.route.file-stable-wait-ms=100
lightesb.route.file-stable-max-attempts=10

# LightESB Service-Level Logging Configuration
lightesb.logging.default-pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} | %-5.5p | [%X{service.name}-%X{service.version}] | %X{route.id} | %X{exchange.id} | %-30.30c{1} | %m%n
lightesb.logging.default-level=INFO
lightesb.logging.console-enabled=true
lightesb.logging.file-max-size=10MB
lightesb.logging.file-max-backup=5

# 日志文件按日期分割和清理配置
lightesb.logging.date-pattern=yyyy-MM-dd
lightesb.logging.log-retention-days=30
lightesb.logging.auto-cleanup-enabled=true
lightesb.logging.cleanup-schedule-hours=24

# 健康检查配置
lightesb.logging.health-check-enabled=true
lightesb.logging.max-log-file-size-mb=100

# MySQL数据库连接配置,引擎自用,使用前需要配置
lightesb.mysql.url=jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
lightesb.mysql.driver=com.mysql.cj.jdbc.Driver
lightesb.mysql.username=root
lightesb.mysql.password=root

