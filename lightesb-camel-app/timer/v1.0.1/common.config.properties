# LightESB Exception Service - 通用配置
# ================================================
# =========================
# 异常处理服务v1.0.0配置
# =========================
# 系统标识
SYSTEMID=LIGHTESB
system.name=lightesb
system.version=1.0.1
system.description=LightESB微服务集成平台

# 端口层级配置 (system/service/version)
port.level=system

# 三层端口配置
# 系统层级端口 (所有服务共享)
#system.port=8086
# 服务层级端口 (同一服务的所有版本共享) 
#service.port=8081
# 版本层级端口 (每个版本独立)
#version.port=8082

# 根据port.level决定使用哪个端口
# 当前使用系统层级端口
server.port=8081

# Camel和Spring Boot配置
HTTP.Listener=false
