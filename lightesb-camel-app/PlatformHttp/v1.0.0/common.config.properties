# LightESB Transform Service - 通用配置
# ================================================
# =========================
# PlatformHttp服务v1.0.0配置
# =========================

# 系统标识
SYSTEMID=CSIP
system.name=csip
system.version=1.0.0
system.description=客户服务集成平台

# 端口层级配置 (system/service/version)
port.level=system

# 三层端口配置
# 系统层级端口 (所有服务共享)
#system.port=8086
# 服务层级端口 (同一服务的所有版本共享) 
#service.port=8081
# 版本层级端口 (每个版本独立)
#version.port=8082

# 根据port.level决定使用哪个端口
# 当前使用系统层级端口
server.port=18081

# Camel和Spring Boot配置
HTTP.Listener=true
# 转换配置
# ================================================

# 基础转换开关
input-transform=true
output-transform=false
system.components=undertowhttp,streamcache,jsontransform,conditionaltransform
# 转换文件配置 (可选，不配置则使用默认文件名)
#input-transform.file=input-transform.jslt
input-transform.file=input-transform-with-import.ds
#output-transform.file=output-transform.jslt

# 高级转换配置
# 支持多种转换文件，根据请求类型动态选择
#transform.complex.input=complex-input-transform.jslt
#transform.simple.input=simple-input-transform.jslt
#transform.xml.output=output-to-xml-transform.jslt
#transform.csv.output=output-to-csv-transform.jslt

# 转换错误处理
#transform.error.continue=true
#transform.error.fallback=true
