
# 系统标识
SYSTEMID=CSIP
system.name=csip
system.version=1.0.0
system.description=客户服务集成平台

# 端口层级配置 (system/service/version)
port.level=system

# 三层端口配置
# 系统层级端口 (所有服务共享)
#system.port=8086
# 服务层级端口 (同一服务的所有版本共享) 
#service.port=8081
# 版本层级端口 (每个版本独立)
#version.port=8082

# 根据port.level决定使用哪个端口
# 当前使用系统层级端口
server.port=18083

# 启动HTTP监听
HTTP.Listener=true

# 系统组件配置加载undertowhttp
system.components=undertowhttp