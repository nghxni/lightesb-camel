# LightESB AiAgentDemoSrv - 服务特定配置

# 服务基本信息
service.name=AiAgentDemoSrv
service.version=v1.0.0

# AI 路由标记
service.ai.route=true
service.ai.type=orderdemo
service.ai.mode=agent

# Agent 工具标签（langchain4j-tools 通过此标签关联工具路由）
ai.agent.tags=order-demo

# 模型参数（共用全局 ChatModel，由 application.yaml 中 lightesb.ai.logging.model.* 配置）
ai.system.prompt=你是一个订单管理助手。你可以帮助用户查询订单状态和取消订单。请用中文回答。

# 外部 API 地址（工具路由中使用）
external.order.api.host=localhost:8088
external.order.api.basepath=/api/orders

# 多轮对话记忆（Agent 模式下可选，首版通过 H2 拼接实现）
ai.memory.enabled=true
ai.memory.max.turns=10
ai.memory.ttl.minutes=30

# 调试配置
ai.debug=false
ai.debug.max.body.length=500

# 接口鉴权（空则放行）
ai.auth.token=


# 多轮记忆：LangChain4j Memory 作为二阶段扩展支持多轮对话